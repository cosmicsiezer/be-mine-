<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forever Rani</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;

            background: url('lilies.jpg') no-repeat center center/cover;

            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;

            text-align: center;
            font-family: Arial, sans-serif;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(255, 105, 180, 0.25);
            backdrop-filter: blur(2px);
            z-index: 0;
        }

        img {
            width: 280px;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(255,255,255,0.7);
            z-index: 2;
        }

        .message {
            margin-top: 20px;
            font-size: 2.3em;
            font-weight: bold;
            color: white;
            z-index: 2;

            text-shadow:
                0 0 5px #fff,
                0 0 10px #ff4da6,
                0 0 20px #ff4da6,
                0 0 40px #ff1a75;

            animation: glow 2s infinite alternate;
            padding: 10px;
        }

        @keyframes glow {
            from {
                text-shadow:
                    0 0 5px #fff,
                    0 0 10px #ff4da6,
                    0 0 20px #ff4da6;
            }

            to {
                text-shadow:
                    0 0 10px #fff,
                    0 0 20px #ff66b3,
                    0 0 40px #ff1a75,
                    0 0 60px #ff1a75;
            }
        }

        .heart {
            position: absolute;
            bottom: -50px;
            color: rgba(255,255,255,0.85);
            font-size: 20px;
            animation: float 6s linear infinite;
            z-index: 1;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(-110vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <img src="cateyes.jpg" alt="Cute Cat Eyes">

    <div class="message">
        Gonna cherish you forever MOHA RANI ❤️
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement("div");

            heart.classList.add("heart");
            heart.innerHTML = "❤️";

            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = (Math.random() * 20 + 20) + "px";
            heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        setInterval(createHeart, 300);
    </script>

</body>
</html>
