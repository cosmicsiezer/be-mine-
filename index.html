<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be Mine ❤️</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;

            background: url('lilies.jpg') no-repeat center center/cover;

            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;

            font-family: Arial, sans-serif;
            text-align: center;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(255, 105, 180, 0.25);
            backdrop-filter: blur(2px);
            z-index: 0;
        }

        h1 {
            color: white;
            font-size: 3em;
            z-index: 2;

            text-shadow:
                0 0 5px white,
                0 0 10px #ff66b3,
                0 0 20px #ff1a75;
        }

        .buttons {
            margin-top: 30px;
            z-index: 2;
        }

        button {
            padding: 15px 30px;
            margin: 10px;
            border: none;
            border-radius: 12px;

            font-size: 1.2em;
            cursor: pointer;

            transition: 0.3s;
        }

        #yesBtn {
            background: #ff4d88;
            color: white;
        }

        #yesBtn:hover {
            background: #ff1a66;
            transform: scale(1.1);
        }

        #noBtn {
            background: white;
            color: #ff4d88;
            position: absolute;
        }
    </style>
</head>

<body>

    <h1>Will You Be Mine? ❤️</h1>

    <div class="buttons">
        <button id="yesBtn" onclick="goToYesPage()">YES ❤️</button>
        <button id="noBtn">NO 💔</button>
    </div>

    <script>
        const noBtn = document.getElementById("noBtn");

        noBtn.addEventListener("mouseover", () => {

            // Move NO button randomly
            noBtn.style.top = Math.random() * 80 + "vh";
            noBtn.style.left = Math.random() * 80 + "vw";

            // Create extra YES buttons
            const extraYes = document.createElement("button");

            extraYes.innerHTML = "YES ❤️";
            extraYes.style.position = "absolute";

            extraYes.style.top = Math.random() * 80 + "vh";
            extraYes.style.left = Math.random() * 80 + "vw";

            extraYes.style.background = "#ff4d88";
            extraYes.style.color = "white";

            extraYes.style.padding = "15px 30px";
            extraYes.style.border = "none";
            extraYes.style.borderRadius = "12px";
            extraYes.style.cursor = "pointer";

            extraYes.onclick = goToYesPage;

            document.body.appendChild(extraYes);
        });

        function goToYesPage() {
            window.location.href = "yes.html";
        }
    </script>

</body>
</html>
