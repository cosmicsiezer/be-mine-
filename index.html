<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be My Valentine?</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="overlay">
        <h1>Tanima, will you be my Valentine? ❤️</h1>

        <div class="buttons" id="buttons-container">
            <button id="yes" onclick="showLove()">Yes</button>
            <button id="no" onclick="multiplyYes()">No</button>
        </div>
    </div>

    <script>
        let firstClick = true;

        function multiplyYes() {

            if (firstClick) {
                alert("You are breaking my heart GOLDFISH");
                firstClick = false;
            } else {
                alert("Na ah nah");
            }

            const container = document.getElementById("buttons-container");

            for (let i = 0; i < 2; i++) {
                let yesButton = document.createElement("button");

                yesButton.innerText = "Yes";
                yesButton.onclick = showLove;

                yesButton.style.fontSize = "20px";
                yesButton.style.padding = "12px 24px";
                yesButton.style.margin = "5px";
                yesButton.style.backgroundColor = "#ff4d6d";
                yesButton.style.color = "white";
                yesButton.style.border = "none";
                yesButton.style.borderRadius = "10px";
                yesButton.style.cursor = "pointer";

                container.appendChild(yesButton);
            }
        }

        function showLove() {
            window.location.href = "yes.html";
        }
    </script>

</body>
</html>
