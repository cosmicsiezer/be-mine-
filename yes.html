<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forever Valentine ❤️</title>
    <link rel="stylesheet" href="styles.css">

    <style>
        .love-container {
            background: rgba(0, 0, 0, 0.5);
            padding: 30px;
            border-radius: 20px;
        }

        .love-message {
            color: white;
            font-size: 3em;
            font-weight: bold;
            margin-top: 20px;
            text-shadow: 2px 2px 10px black;
        }

        img {
            width: 350px;
            max-width: 90%;
            border-radius: 20px;
            box-shadow: 0px 0px 20px rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>

    <div class="love-container">
        <img src="cateyes.jpg" alt="Love Cat">

        <div class="love-message">
            You Are My Forever Valentine ❤️
        </div>
    </div>

</body>
</html>
